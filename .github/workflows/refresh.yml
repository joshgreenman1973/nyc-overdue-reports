name: Refresh data

on:
  schedule:
    # Mondays 11:00 UTC (7am New York). Source datasets update roughly monthly;
    # weekly keeps the "days late" counters honest without hammering the API.
    - cron: "0 11 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Rebuild data.json
        run: python3 build.py
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet && echo "No changes" || {
            git commit -m "Data refresh: $(date -u +%F)"
            git push
          }
